name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  #  Windows  →  .exe
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean build artifacts
        shell: cmd
        run: |
          if exist build rmdir /s /q build
          if exist dist rmdir /s /q dist

      - name: Build EXE with PyInstaller
        shell: cmd
        run: |
          pyinstaller --onefile --windowed --clean --noconfirm --icon=icon.png --add-data "icon.png;." --name "Ash Album" main.py

      - name: Convert icon.png to icon.ico
        shell: cmd
        run: |
          python -c "from PIL import Image; img = Image.open('icon.png').convert('RGBA'); img.save('icon.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"

      - name: Install Inno Setup
        shell: cmd
        run: |
          choco install innosetup --no-progress -y

      - name: Build Setup EXE with Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer.iss

      - name: Upload Windows portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: "dist/Ash Album.exe"

      - name: Upload Windows Setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: "dist/Ash Album Setup.exe"

  # ──────────────────────────────────────────────
  #  Linux (Debian/Ubuntu/Mint)  →  .deb
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libglib2.0-0 \
            libdbus-1-3 \
            libfontconfig1 \
            libfreetype6 \
            libgl1-mesa-glx \
            libgstreamer1.0-0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            dpkg-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile --windowed --clean --noconfirm \
            --icon=icon.png --add-data "icon.png:." \
            --name "ash-album" main.py

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: |
          set -e
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_ROOT="ash-album_${VERSION}_amd64"

          # Directory structure
          mkdir -p "${PKG_ROOT}/DEBIAN"
          mkdir -p "${PKG_ROOT}/usr/bin"
          mkdir -p "${PKG_ROOT}/usr/share/applications"
          mkdir -p "${PKG_ROOT}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${PKG_ROOT}/usr/share/ash-album"

          # Copy binary
          cp dist/ash-album "${PKG_ROOT}/usr/bin/ash-album"
          chmod 755 "${PKG_ROOT}/usr/bin/ash-album"

          # Copy icon
          cp icon.png "${PKG_ROOT}/usr/share/icons/hicolor/256x256/apps/ash-album.png"

          # Desktop entry (file manager integration)
          cat > "${PKG_ROOT}/usr/share/applications/ash-album.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=Ash Album
          Comment=Modern photo and video gallery with PDF tools
          Exec=ash-album %f
          Icon=ash-album
          Terminal=false
          Type=Application
          Categories=Graphics;Photography;Viewer;
          MimeType=image/jpeg;image/png;image/bmp;image/webp;image/gif;video/mp4;video/x-matroska;video/quicktime;video/x-msvideo;video/webm;application/pdf;
          DESKTOP

          # Remove leading whitespace from heredoc (YAML indent)
          sed -i 's/^          //' "${PKG_ROOT}/usr/share/applications/ash-album.desktop"

          # DEBIAN/control
          cat > "${PKG_ROOT}/DEBIAN/control" << CONTROL
          Package: ash-album
          Version: ${VERSION}
          Section: graphics
          Priority: optional
          Architecture: amd64
          Depends: libegl1, libgl1, libglib2.0-0, libfontconfig1, libdbus-1-3, libxkbcommon0, libxcb-cursor0, libxcb-icccm4, libxcb-keysyms1, libxcb-shape0
          Installed-Size: $(du -sk "${PKG_ROOT}/usr" | cut -f1)
          Maintainer: Ash Album <ash-album@users.noreply.github.com>
          Description: Modern photo and video gallery for the desktop
           Ash Album is a sleek, modern photo and video gallery with powerful
           PDF creation capabilities. Browse images and videos, crop photos,
           generate PDFs, and manage your media collection.
          CONTROL

          # Remove leading whitespace from heredoc (YAML indent)
          sed -i 's/^          //' "${PKG_ROOT}/DEBIAN/control"

          # Build deb
          dpkg-deb --build --root-owner-group "${PKG_ROOT}"

          # Rename for release
          mv "${PKG_ROOT}.deb" "Ash-Album_${VERSION}_amd64.deb"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: Ash-Album_*_amd64.deb

  # ──────────────────────────────────────────────
  #  Publish both artifacts to GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows portable EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: Download Windows Setup EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: artifacts/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-deb
          path: artifacts/

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
